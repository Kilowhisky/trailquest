name: Deploy to GitHub Pages

# Publishes the live demo to https://kilowhisky.github.io/trailquest/ on every
# push to main (i.e. after each merge), so reviewers click a link to see the map.
# Requires Pages source = "GitHub Actions" (set once, post-merge of step 1).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `vite build` does not typecheck, and the first deploy fires before branch
      # protection exists — so re-run the full gate here to guarantee main never
      # publishes a broken build, independent of CI / branch protection.
      - name: Verify (typecheck · lint · test)
        run: |
          npm run typecheck
          npm run lint
          npm run test:run

      - name: Build (emits dist/ with /trailquest/ base)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
